<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <a id="top"></a>
<div class="nav">
    <button id="burger" class="burger" type="button">&#9776;</button>

    <div id="nav_menu" class="nav_menu">
        <a class="button" href="#top">Top</a>
        <a id="new_card" href="#bottom" class="button">+</a>
        <button class="button" type="button">New</button>
    </div>
</div>

    <div id="container" class="main">
        <div class="card">
            <textarea spellcheck="false" maxlength="170"></textarea>
            <div class="lines">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="circle"></div>
        </div>

        <div class="card">
            <textarea spellcheck="false" maxlength="170"></textarea>
            <div class="lines">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="circle"></div>
        </div>

        <div class="card">
            <textarea spellcheck="false" maxlength="170"></textarea>
            <div class="lines">

                <div></div>

            </div>
            <div class="circle"></div>
        </div>

        <div class="card">
            <textarea spellcheck="false" maxlength="170"></textarea>
            <div class="lines">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="circle"></div>
        </div>
    </div>

    <a id="bottom"></a>

<script>
    const newCardBtn = document.getElementById("new_card");
    const container = document.getElementById("container");
    const burger = document.getElementById("burger");
    const navMenu = document.getElementById("nav_menu");

    burger.addEventListener("click", () => {
        navMenu.classList.toggle("open");
    });

    newCardBtn.addEventListener("click", (e) => {
        e.preventDefault();

        container.insertAdjacentHTML('beforeend',
        `<div class="card">
            <textarea spellcheck="false" maxlength="170"></textarea>
            <div class="lines">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="circle"></div>
        </div>`);

        const cards = container.querySelectorAll(".card");
        cards[cards.length - 1].scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    });
</script>
</body>
</html>
